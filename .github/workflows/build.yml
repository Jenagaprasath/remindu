name: Build & Release APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create Flutter project
        run: flutter create --org com.remindu --platforms android temp_project

      - name: Copy our source files into temp_project
        run: |
          rm -rf temp_project/lib
          cp -r lib temp_project/lib
          cp pubspec.yaml temp_project/pubspec.yaml

      - name: Install dependencies
        working-directory: temp_project
        run: flutter pub get

      - name: Build APK
        working-directory: temp_project
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK to Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: temp_project/build/app/outputs/flutter-apk/app-release.apk
          tag: latest
          name: "Remindu Latest Build"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}